services:
  - type: web
    name: campus-service
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && ls -la staticfiles/admin/css/
    startCommand: python manage.py migrate --noinput && gunicorn website.wsgi:application --log-file -
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: SECRET_KEY
        value: "OWy25Cfg7Rb3kux9HvmMiTBasl0SdpELGr6nKtIXhAY4QwePoz"
      - key: ALLOWED_HOSTS
        value: "*.onrender.com,*"
      - key: PYTHON_VERSION
        value: "3.12"
