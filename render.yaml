services:
  - type: web
    name: campus-service
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn website.wsgi --log-file -
    envVars:
      - key: DEBUG
        value: false
      - key: DJANGO_DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: PYTHONVERSION
        value: "3.12"
